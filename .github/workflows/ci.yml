# CI: runs the same commands as local `npm run check` (docs/ci.md).
# No secrets are used anywhere in this workflow.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch/PR supersedes the running build.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: npm
      # Node 22 bundles npm 10, which reads this lockfile differently from
      # the npm 11 used locally (optional-dep entries) and fails `npm ci`.
      # Keep CI on the same npm major as local development (docs/ci.md).
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
