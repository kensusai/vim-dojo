# CI: runs the same commands as local `npm run check` (docs/ci.md).
# No secrets are used anywhere in this workflow.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch/PR supersedes the running build.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: npm
      # Node 22 bundles npm 10, which reads this lockfile differently from
      # the npm 11 used locally (optional-dep entries) and fails `npm ci`.
      # Keep CI on the same npm major as local development (docs/ci.md).
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # Real-browser smoke: unit tests alone have missed DOM-path bugs before
  # (docs/ci.md, docs/monitoring.md). One short spec keeps pushes honest.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm install -g npm@11
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
